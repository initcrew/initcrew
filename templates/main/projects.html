{% extends 'base.html' %}
{% load static %}
{% block content %}
    <!-- Main Section -->
    <section class="our_team" id="our_team">
      <div class="container border-b">
        <div class="m-title text-center">
          <h2>PROJECTS</h2>
        </div>
        <div class="row event">
          {% for project in projects %}
            <div class="col-md-6 col-lg-4 team d-flex">
              <div class="border-t" style="position: relative; padding-bottom: 80px !important;">
                <div class="title-t text-center">
                  <h3>{{ project.name }}</h3>
                  <p style="font-size: 16px; font-family: 'Poppins', sans-serif; text-align: left; letter-spacing: 1px !important; overflow: hidden !important;">{{ project.description }}</p>
                  <p>
                    <a href="{{ project.url }}" class="social-link project-link" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github h1"></i></a>
                  </p>
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
      </div>
    </section>
{% endblock content %}
